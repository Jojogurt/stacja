# wrangler.toml — deploy autorytetu pokoju (Cloudflare Worker + Durable Object)
# Deploy:  cd server && npm install && npx wrangler login && npx wrangler deploy
name = "stacja-rooms"
main = "index.js"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Durable Object pokoju gry. SQLite-backed → działa na DARMOWYM planie Workers.
[[durable_objects.bindings]]
name = "GameRoom"
class_name = "GameRoom"

# Autorytatywny pokój gry (TASK 6.2) — osobna klasa/trasa (/parties/game-authority/<kod>).
# Żywy relay GameRoom nietknięty; klient wybiera transport flagą.
[[durable_objects.bindings]]
name = "GameAuthority"
class_name = "GameAuthority"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["GameAuthority"]

# v3+v4 — jednorazowy PURGE osieroconego storage pokoi sprzed sprzątania: v3 skasowała klasę,
# v4 odtwarza ją czystą. Bezpieczne: w storage DO nie ma ważnych danych (mecze w D1, gry ulotne).
[[migrations]]
tag = "v3"
deleted_classes = ["GameAuthority"]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["GameAuthority"]

# Baza D1 (profile, mecze, drużyny, znajomi) — zastępuje Postgres z Supabase.
[[d1_databases]]
binding = "DB"
database_name = "stacja-db"
database_id = "7a774a82-a7d9-4341-96dc-29cd54635914"

# S3 — natywny rate-limiter Cloudflare (per-IP) dla otwartych proxy /tracks /spotify /audio.
# Nominał 120/60 s; limiter dopuszcza burst ~2–3× → legit user (kilkadziesiąt/min) nietknięty,
# scraper (tysiące/min) blokowany. (Zweryfikowane: przy limit=5 realnie sypie 429.)
[[unsafe.bindings]]
name = "PROXY_RL"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 120, period = 60 }

# Sekret HMAC do podpisywania tokenów tożsamości (device-UUID). Ustaw poza repo:
#   echo '<losowy-sekret>' | npx wrangler secret put TOKEN_SECRET
